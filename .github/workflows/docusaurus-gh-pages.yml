name: Deploy Docusaurus docs site to GitHub Pages

on:
  push:
    branches: ["main", "claude/docusaurus-dark-light-theme-4BT5j"]
    paths:
      - "docs/**"
      - ".github/workflows/docusaurus-gh-pages.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install D2
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s -- --prefix "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Render D2 diagrams
        run: bash docs/diagrams/render.sh

      - name: Install Docusaurus dependencies
        run: npm ci
        working-directory: docs

      - name: Build Docusaurus site
        run: npm run build
        working-directory: docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
