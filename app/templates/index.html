<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Server Manager</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #242836; --border: #2e3346;
      --text: #e1e4ed; --text-dim: #8b90a5; --accent: #6c8cff; --accent-h: #8ba4ff;
      --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

    header { margin-bottom: 2rem; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header .sub { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.2rem; }

    /* ── Game cards ───────────────────────────────────── */
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; margin-bottom: 1.5rem; }

    .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .game-card.running { border-color: rgba(74, 222, 128, 0.3); }
    .game-card.starting { border-color: rgba(251, 191, 36, 0.3); }
    .game-card.error { border-color: rgba(248, 113, 113, 0.25); }

    .game-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
    .status-dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.starting { background: var(--yellow); animation: pulse 1.5s infinite; }
    .status-dot.stopped { background: var(--red); }
    .status-dot.not_deployed { background: var(--yellow); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .game-name { font-weight: 600; font-size: 1rem; text-transform: capitalize; }
    .game-status-label { font-size: 0.75rem; color: var(--text-dim); margin-left: auto; }

    .game-connect { font-family: monospace; font-size: 0.78rem; color: var(--green); margin-bottom: 0.75rem; min-height: 1.2rem; }
    .game-connect .ip { color: var(--text-dim); }
    .copy-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-size: 0.65rem; padding: 0.1rem 0.35rem; cursor: pointer; margin-left: 0.3rem; vertical-align: middle; }
    .copy-btn:hover { background: var(--surface2); color: var(--text); }

    .game-cost { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 1rem; }
    .game-cost span { color: var(--accent); font-weight: 500; }

    .game-actions { display: flex; gap: 0.5rem; }

    /* ── Buttons ─────────────────────────────────────── */
    button { border: none; border-radius: 7px; padding: 0.5rem 1rem; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: filter .15s; }
    .btn-start { background: var(--green); color: #000; }
    .btn-start:hover { filter: brightness(1.1); }
    .btn-stop { background: var(--red); color: #fff; }
    .btn-stop:hover { filter: brightness(1.1); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.75rem; }
    button:disabled { opacity: .4; cursor: not-allowed; filter: none; }

    /* ── Bottom panels ───────────────────────────────── */
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
    @media(max-width:640px){ .panels{ grid-template-columns:1fr; } }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .panel h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); margin-bottom: 1rem; }

    /* Cost chart */
    .cost-bars { display: flex; align-items: flex-end; gap: 3px; height: 72px; }
    .cost-bar { flex: 1; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; position: relative; }
    .cost-bar:hover::after { content: attr(data-tip); position: absolute; bottom: 105%; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); padding: .2rem .5rem; border-radius: 4px; font-size: .7rem; white-space: nowrap; color: var(--text); }
    .cost-total { margin-top: .5rem; font-size: .78rem; color: var(--text-dim); }
    .cost-per-game { margin-top: .75rem; }
    .cost-row { display: flex; justify-content: space-between; font-size: .78rem; padding: .2rem 0; border-top: 1px solid var(--border); color: var(--text-dim); }
    .cost-row .game-n { text-transform: capitalize; }
    .cost-row .cost-v { color: var(--accent); }

    /* Logs */
    .log-game-select { margin-bottom: .6rem; }
    .log-game-select select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: .82rem; padding: .35rem .6rem; }
    .log-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: .6rem; max-height: 200px; overflow-y: auto; font-family: 'SF Mono','Fira Code',monospace; font-size: .72rem; line-height: 1.7; color: var(--text-dim); }
    .log-line { white-space: pre-wrap; word-break: break-all; }

    /* Watchdog config */
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
    .config-grid label { font-size: .72rem; color: var(--text-dim); display: block; margin-bottom: .2rem; }
    .config-grid input { width: 100%; padding: .4rem .6rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: .82rem; }
    .config-grid input:focus { outline: none; border-color: var(--accent); }
    .config-hint { font-size: .72rem; color: var(--text-dim); margin-top: .6rem; }
    .config-actions { margin-top: .75rem; }

    /* Toast */
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .65rem 1rem; font-size: .82rem; opacity: 0; transition: opacity .3s; z-index: 100; }
    .toast.show { opacity: 1; }

    /* Loading state */
    .loading { text-align: center; color: var(--text-dim); font-size: .85rem; padding: 2rem; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Game Server Manager</h1>
    <div class="sub">AWS Fargate · Auto-shutdown watchdog · Route 53 DNS</div>
  </header>

  <!-- Game cards (populated by JS) -->
  <div class="games-grid" id="gamesGrid">
    <div class="loading">Loading servers...</div>
  </div>

  <!-- Bottom panels -->
  <div class="panels">
    <!-- Actual costs -->
    <div class="panel">
      <h2>Actual Costs (7 days)</h2>
      <div class="cost-bars" id="costBars"></div>
      <div class="cost-total" id="costTotal"></div>
      <div class="cost-per-game" id="costPerGame"></div>
    </div>

    <!-- Watchdog config -->
    <div class="panel">
      <h2>Watchdog Settings</h2>
      <div class="config-grid">
        <div>
          <label>Check interval (min)</label>
          <input id="cfgInterval" type="number" min="1" max="60">
        </div>
        <div>
          <label>Idle checks before shutdown</label>
          <input id="cfgIdleChecks" type="number" min="1" max="20">
        </div>
        <div>
          <label>Min packets (activity threshold)</label>
          <input id="cfgMinPackets" type="number" min="1">
        </div>
      </div>
      <div class="config-hint" id="watchdogHint"></div>
      <div class="config-actions">
        <button class="btn-secondary btn-sm" onclick="saveWatchdogConfig()">Save</button>
      </div>
    </div>
  </div>

  <!-- Logs panel -->
  <div class="panel">
    <h2>Server Logs</h2>
    <div class="log-game-select">
      <select id="logGameSelect" onchange="fetchLogs()"></select>
    </div>
    <div class="log-box" id="logBox"><div class="log-line">Select a game above...</div></div>
    <div style="margin-top:.6rem;">
      <button class="btn-secondary btn-sm" onclick="fetchLogs()">Refresh Logs</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let gameNames = [];
let estimates = {};

// ── Helpers ────────────────────────────────────────────────────────────────
async function api(url, opts) {
  try {
    const r = await fetch(url, opts);
    return await r.json();
  } catch(e) { return { error: e.message }; }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function copyText(str) {
  navigator.clipboard.writeText(str).then(() => toast('Copied!')).catch(()=>{});
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Game cards ─────────────────────────────────────────────────────────────
function renderGameCard(status) {
  const game  = status.game || 'unknown';
  const state = status.state || 'unknown';
  const est   = estimates[game];

  const stateLabels = { running:'Online', starting:'Starting…', stopped:'Offline', not_deployed:'Not Deployed', error:'Error' };
  const label = stateLabels[state] || state;

  let connectHtml = '';
  if (status.hostname) {
    const connectStr = status.hostname + ':' + (game === 'palworld' ? '8211' : '7777');
    connectHtml = `${connectStr}<button class="copy-btn" onclick="copyText('${connectStr}')">copy</button>`;
    if (status.public_ip) connectHtml += ` <span class="ip">(${status.public_ip})</span>`;
  } else if (status.public_ip) {
    connectHtml = status.public_ip;
  }

  const costHtml = est
    ? `<span>$${est.cost_per_hour}/hr</span> · ~$${est.cost_per_month_4hpd}/mo at 4 hrs/day`
    : '';

  const canStart = state === 'stopped' || state === 'not_deployed';
  const canStop  = state === 'running' || state === 'starting';

  return `
    <div class="game-card ${state}" id="card-${game}">
      <div class="game-header">
        <div class="status-dot ${state}"></div>
        <div class="game-name">${esc(game)}</div>
        <div class="game-status-label">${label}</div>
      </div>
      <div class="game-connect">${connectHtml}</div>
      <div class="game-cost">${costHtml}</div>
      <div class="game-actions">
        <button class="btn-start btn-sm" id="btn-start-${game}"
          onclick="startGame('${game}')" ${canStart ? '' : 'disabled'}>Start</button>
        <button class="btn-stop btn-sm" id="btn-stop-${game}"
          onclick="stopGame('${game}')" ${canStop ? '' : 'disabled'}>Stop</button>
        <button class="btn-secondary btn-sm" onclick="refreshGame('${game}')">↻</button>
      </div>
    </div>`;
}

async function fetchAllStatuses() {
  const statuses = await api('/api/status');
  if (!Array.isArray(statuses)) return;
  const grid = document.getElementById('gamesGrid');
  if (statuses.length === 0) {
    grid.innerHTML = '<div class="loading">No games configured. Run terraform apply first.</div>';
    return;
  }
  grid.innerHTML = statuses.map(renderGameCard).join('');

  // Populate log game selector
  const sel = document.getElementById('logGameSelect');
  const prev = sel.value;
  sel.innerHTML = statuses.map(s => `<option value="${s.game}">${s.game}</option>`).join('');
  if (prev && statuses.find(s => s.game === prev)) sel.value = prev;
}

async function refreshGame(game) {
  const status = await api(`/api/status/${game}`);
  const card = document.getElementById(`card-${game}`);
  if (card) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderGameCard(status);
    card.replaceWith(tmp.firstElementChild);
  }
}

// ── Start / Stop ───────────────────────────────────────────────────────────
async function startGame(game) {
  document.getElementById(`btn-start-${game}`).disabled = true;
  toast(`Starting ${game}…`);
  const data = await api(`/api/start/${game}`, { method: 'POST' });
  toast(data.message || 'Start request sent');
  setTimeout(() => refreshGame(game), 3000);
  setTimeout(() => refreshGame(game), 10000);
}

async function stopGame(game) {
  document.getElementById(`btn-stop-${game}`).disabled = true;
  toast(`Stopping ${game}…`);
  const data = await api(`/api/stop/${game}`, { method: 'POST' });
  toast(data.message || 'Stop request sent');
  setTimeout(() => refreshGame(game), 3000);
}

// ── Cost estimates ─────────────────────────────────────────────────────────
async function fetchEstimates() {
  const data = await api('/api/costs/estimate');
  estimates = data.games || {};
  // Re-render cards with cost info
  fetchAllStatuses();

  const container = document.getElementById('costPerGame');
  container.innerHTML = Object.entries(estimates).map(([game, est]) =>
    `<div class="cost-row"><span class="game-n">${esc(game)}</span><span class="cost-v">$${est.cost_per_hour}/hr</span></div>`
  ).join('');
}

// ── Actual costs ───────────────────────────────────────────────────────────
async function fetchActualCosts() {
  const data = await api('/api/costs/actual');
  const bars  = document.getElementById('costBars');
  const total = document.getElementById('costTotal');

  if (data.error || !data.daily?.length) {
    bars.innerHTML = '<span style="font-size:.75rem;color:var(--text-dim)">No cost data available</span>';
    total.textContent = '';
    return;
  }
  const max = Math.max(...data.daily.map(d => d.cost), 0.001);
  bars.innerHTML = data.daily.map(d => {
    const pct = Math.max((d.cost / max) * 100, 2);
    return `<div class="cost-bar" style="height:${pct}%" data-tip="${d.date}: $${d.cost.toFixed(4)}"></div>`;
  }).join('');
  total.textContent = `Total: $${data.total.toFixed(2)} over ${data.days} days`;
}

// ── Watchdog config ────────────────────────────────────────────────────────
async function fetchWatchdogConfig() {
  const cfg = await api('/api/config');
  document.getElementById('cfgInterval').value   = cfg.watchdog_interval_minutes || 15;
  document.getElementById('cfgIdleChecks').value  = cfg.watchdog_idle_checks || 4;
  document.getElementById('cfgMinPackets').value  = cfg.watchdog_min_packets || 100;
  updateWatchdogHint(cfg);
}

function updateWatchdogHint(cfg) {
  const minutes = (cfg.watchdog_interval_minutes || 15) * (cfg.watchdog_idle_checks || 4);
  document.getElementById('watchdogHint').textContent =
    `Auto-shutdown after ${minutes} minutes of idle (${cfg.watchdog_interval_minutes || 15} min × ${cfg.watchdog_idle_checks || 4} checks). Note: changing these here is for reference — update your Terraform vars to actually change the Lambda schedule.`;
}

async function saveWatchdogConfig() {
  const cfg = {
    watchdog_interval_minutes: parseInt(document.getElementById('cfgInterval').value),
    watchdog_idle_checks:      parseInt(document.getElementById('cfgIdleChecks').value),
    watchdog_min_packets:      parseInt(document.getElementById('cfgMinPackets').value),
  };
  await api('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cfg),
  });
  toast('Config saved');
  updateWatchdogHint(cfg);
}

// ── Logs ───────────────────────────────────────────────────────────────────
async function fetchLogs() {
  const game = document.getElementById('logGameSelect').value;
  if (!game) return;
  const data = await api(`/api/logs/${game}`);
  const box  = document.getElementById('logBox');
  if (data.lines?.length) {
    box.innerHTML = data.lines.map(l => `<div class="log-line">${esc(l)}</div>`).join('');
    box.scrollTop = box.scrollHeight;
  } else {
    box.innerHTML = `<div class="log-line">No logs for ${esc(game)}.</div>`;
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  await fetchEstimates();    // loads cost data + triggers status render
  fetchActualCosts();
  fetchWatchdogConfig();
  fetchLogs();
}

init();
// Auto-refresh all statuses every 20 seconds
setInterval(fetchAllStatuses, 20000);
</script>
</body>
</html>
