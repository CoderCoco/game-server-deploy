title: Game Server Deploy
description: >-
  Cost-efficient multi-game dedicated server platform on AWS Fargate with a
  local management UI and a fully serverless Discord bot.

# Just the Docs — documentation theme with a left-hand nav sidebar, built-in
# search, and native Mermaid support. Pulled via remote_theme because it's
# not one of GitHub Pages' built-in themes; the jekyll-remote-theme plugin
# below is whitelisted on Pages.
remote_theme: just-the-docs/just-the-docs@v0.10.1
color_scheme: light
search_enabled: true
heading_anchors: true
aux_links:
  GitHub:
    - https://github.com/codercoco/game-server-deploy

# Just the Docs renders ```mermaid fenced code blocks when this key is set
# (it injects the Mermaid ESM bundle from a CDN at the pinned version).
mermaid:
  version: "10.9.1"

# Jekyll only processes this docs/ folder. The repo README, LICENSE, CLAUDE.md,
# CONTRIBUTING.md and all application/terraform source live outside of it and
# are not published.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  # D2 sources + helpers are build-time inputs only; the rendered *.svg
  # outputs in the same directory are what get published.
  - "diagrams/.gitignore"
  - "diagrams/*.d2"
  - "diagrams/render.sh"
  - "diagrams/README.md"

# Kramdown + GFM for tables and fenced code blocks.
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

# Make every *.md file reachable as /foo/ rather than /foo.html.
permalink: pretty
